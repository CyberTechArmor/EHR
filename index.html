<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchart — EMR</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Google Fonts: DM Sans + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/schedule.css">
  <link rel="stylesheet" href="css/pages/inbox.css">
  <link rel="stylesheet" href="css/pages/patient-chart.css">
  <link rel="stylesheet" href="css/pages/encounter.css">
  <link rel="stylesheet" href="css/pages/reports.css">
  <link rel="stylesheet" href="css/pages/patients.css">
  <link rel="stylesheet" href="css/pages/settings.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
      <!-- Top Header -->
      <header class="top-header" id="top-header"></header>

      <!-- Main Content -->
      <main class="main-content" id="app"></main>
    </div>
  </div>

  <!-- Command Palette Overlay -->
  <div class="cmd-palette-backdrop" id="cmd-palette-backdrop">
    <div class="cmd-palette" id="cmd-palette"></div>
  </div>

  <!-- Slide Panel -->
  <div class="slide-panel-backdrop" id="slide-panel-backdrop"></div>
  <div class="slide-panel" id="slide-panel"></div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
